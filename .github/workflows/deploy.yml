name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: deploy-peptide-reconstitution-calculator
  cancel-in-progress: true

jobs:
  ci:
    name: Pre-deploy CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    name: Deploy (shared pipeline)
    needs: ci
    uses: peptide-repo/peptide-e2e/.github/workflows/deploy-app.yml@main
    with:
      target_path: wp-content/plugins/peptide-reconstitution-calculator
    secrets: inherit
